version: '2.3'

services:

    jeedom:
        container_name: jeedom
        build: .
        privileged: true
        pid: "host"
        cap_add:
             - SYS_PTRACE
        tty: true
        hostname: jeedom
        #mac_address: a0:ca:ab:cd:ef:02
        #networks:
        #     default:
        #        ipv4_address: 192.168.1.11
        # devices:
        #     - "/dev/ttyUSB0"
        #     - "/dev/ttyUSB1"
        #     - "/dev/ttyACM0"
        restart: unless-stopped
        volumes:
          - .:/var/www/html
          - ./db:/var/lib/mysql
        healthcheck:
          test: ["CMD-SHELL", "curl -so /tmp/status http://here.html || exit 1"]
          interval: 1m30s
          retries: 3
          start_period: 40s
          timeout: 20s
